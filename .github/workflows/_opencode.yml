name: OpenCode Private Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions: {}

jobs:
  opencode:
    if: |
      startsWith(github.event.comment.body, '/oc') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          client-id: ${{ vars.CI_AI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_AI_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ steps.generate-token.outputs.token }}

      - name: Run OpenCode
        uses: anomalyco/opencode/github@acd8783a36d8642ade7038f34ca4f2f2ac3cc824  # v1.14.28
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          OPENROUTER_API_KEY: ${{ secrets.CI_AI_OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.CI_AI_DEEPSEEK_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.CI_AI_OPENCODE_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.CI_AI_LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.CI_AI_LANGFUSE_SECRET_KEY }}
        with:
          model: ${{ vars.CI_AI_MODEL_NAME || 'opencode/minimax-m2.5-free' }}
          use_github_token: true
          share: false
