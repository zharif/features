name: OpenCode Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions: {}

jobs:
  opencode:
    if: |
      startsWith(github.event.comment.body, '/oc') ||
      startsWith(github.event.comment.body, '/opencode') ||
      startsWith(github.event.comment.body, '@zharif-ai-app')
    name: Pull Request Review
    uses: zharif/reusable-workflows/.github/workflows/reusable-opencode.yml@v2 # zizmor: ignore[unpinned-uses]
    permissions:
      contents: read
    with:
      client-id: ${{ vars.CI_AI_APP_CLIENT_ID }}
      runner: ${{ vars.RUNNER || 'ubuntu-latest' }}
      opencode-log-level: ${{ vars.CI_AI_OPENCODE_LOG_LEVEL || 'INFO' }}
      opencode-model: ${{ vars.CI_AI_MODEL_NAME }}
    secrets:
      app-private-key: ${{ secrets.CI_AI_APP_PRIVATE_KEY }}
      openrouter-api-key: ${{ secrets.CI_AI_OPENROUTER_API_KEY }}
      deepseek-api-key: ${{ secrets.CI_AI_DEEPSEEK_API_KEY }}
      opencode-api-key: ${{ secrets.CI_AI_OPENCODE_API_KEY }}
      langfuse-public-key: ${{ secrets.CI_AI_LANGFUSE_PUBLIC_KEY }}
      langfuse-secret-key: ${{ secrets.CI_AI_LANGFUSE_SECRET_KEY }}
      ci-cache-access-key: ${{ secrets.CI_CACHE_ACCESS_KEY }}
      ci-cache-secret-key: ${{ secrets.CI_CACHE_SECRET_KEY }}
