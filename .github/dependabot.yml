"registries":
  "github-zharif-org":
    "password": "${{ secrets.GH_ORG_READ_ONLY }}"
    "type": "git"
    "url": "https://github.com"
    "username": "x-access-token"
"updates":
- "commit-message":
    "include": "scope"
    "prefix": "chore"
  "cooldown":
    "default-days": 7
  "directory": "/"
  "groups":
    "github-actions":
      "patterns":
      - "*"
      "update-types":
      - "minor"
      - "patch"
  "ignore":
  - "dependency-name": "zharif/*"
  "labels":
  - "dependencies"
  - "github-actions"
  "open-pull-requests-limit": 10
  "package-ecosystem": "github-actions"
  "registries":
  - "github-zharif-org"
  "schedule":
    "day": "monday"
    "interval": "weekly"
    "time": "09:00"
    "timezone": "Asia/Kuala_Lumpur"
"version": 2
